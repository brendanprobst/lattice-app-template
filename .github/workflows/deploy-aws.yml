# Manual deploy: Terraform (AWS) + API Lambda bundle + static web + S3 sync.
# Does not run on push — only workflow_dispatch on main. Requires OIDC + secrets (see docs/deploy-aws.md).

name: Deploy (AWS)

on:
  workflow_dispatch:
    inputs:
      skip_web:
        description: "Skip Next static build and S3 sync (Lambda + Terraform only)"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-aws-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          # Must match infra/terraform/envs/dev/terraform.tfvars → aws_region
          aws-region: us-east-1

      - name: Install dependencies
        run: npm ci

      - name: Write terraform.tfvars from secret
        env:
          CONTENT: ${{ secrets.TERRAFORM_TFVARS }}
        run: |
          if [ -z "${CONTENT}" ]; then
            echo "Configure repository secret TERRAFORM_TFVARS with the full contents of terraform.tfvars (same as local deploy)."
            exit 1
          fi
          printf '%s\n' "${CONTENT}" > infra/terraform/envs/dev/terraform.tfvars

      - name: Deploy
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          EXTRA=""
          if [ "${{ inputs.skip_web }}" = "true" ]; then
            EXTRA="${EXTRA} --skip-web"
          fi
          npm run deploy:aws -- --auto-approve ${EXTRA}
