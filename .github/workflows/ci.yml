name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Match root package.json engines (Next/ESLint toolchain expects Node 20.19+).
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            apps/web/.next/cache
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-turbo-${{ hashFiles('package.json', 'turbo.json', 'apps/api/package.json', 'apps/web/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-turbo-
            ${{ runner.os }}-turbo-

      - name: Install dependencies (workspaces)
        run: npm ci

      - name: CI (Turbo build, lint, type-check, Jest coverage)
        run: npm run ci

  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform format (check)
        run: terraform fmt -check -recursive infra/terraform

      - name: Terraform validate (dev stack)
        working-directory: infra/terraform/envs/dev
        run: terraform init -backend=false -input=false && terraform validate
