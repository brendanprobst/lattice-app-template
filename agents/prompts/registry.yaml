# Agent registry
#
# Source of truth: agents/prompts/<id>.md
#
# Generate tool-specific configs from these prompts:
#   npm run use:claude   →  CLAUDE.md files (hierarchical, one per glob directory)
#   npm run use:cursor   →  .cursor/rules/*.mdc files (frontmatter + body)
#   npm run agents:sync  →  both simultaneously

agents:
  - id: ddd-expert
    path: prompts/ddd-expert.md
    description: "DDD expert — domain & application layers (auto when editing domain/use-case files)"
    scope: path-scoped
    globs:
      - apps/api/domain/**
      - apps/api/application/**
      - docs/adr/**

  - id: test-expert
    path: prompts/test-expert.md
    description: "Test expert — Jest & integration tests (auto when editing tests or feature code under apps/)"
    scope: path-scoped
    globs:
      - test/api/**
      - test/web/**
      - test/AGENTS.md
      - apps/api/**
      - apps/web/client/**
      - apps/web/app/**

  - id: infra-expert
    path: prompts/infra-expert.md
    description: "Infra expert — adapters, composition root, config, seed (auto when editing infra/config)"
    scope: path-scoped
    globs:
      - apps/api/infrastructure/**
      - apps/api/config/**
      - apps/web/client/lib/**
      - seed.json

  - id: debugger-expert
    path: prompts/debugger-expert.md
    description: "Debugger expert — attach with @Rules when investigating failures, flakes, or production errors"
    scope: attach-via-rules
    command: debug

  - id: code-janitor
    path: prompts/code-janitor.md
    description: "Code janitor — attach with @Rules for audits, cleanup PRs, consistency, and hygiene"
    scope: attach-via-rules
    command: janitor

